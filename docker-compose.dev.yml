version: '3.8'

# Development compose file - uses locally built images
# Build first: bazel run //oci:server_load //oci:worker_load

services:
  bazel-remote:
    image: buchgr/bazel-remote-cache:latest
    ports:
      - "9094:9094"
      - "8080:8080"
    volumes:
      - bazel-remote-data:/data
    command: |
      --dir=/data
      --max_size=10
      --grpc_port=9094
      --http_port=8080

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  server:
    image: ferrisrbe/server:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9092:9092"
    environment:
      - RBE_PORT=9092
      - RBE_BIND_ADDRESS=0.0.0.0
      - RUST_LOG=debug
      - CAS_ENDPOINT=bazel-remote:9094
      - REDIS_ENDPOINT=redis:6379
    depends_on:
      - bazel-remote
      - redis

  worker:
    image: ferrisrbe/worker:latest
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - WORKER_ID=worker-dev
      - SERVER_ENDPOINT=http://server:9092
      - CAS_ENDPOINT=http://bazel-remote:9094
      - RUST_LOG=debug
      - MAX_CONCURRENT=4
    depends_on:
      - server
    volumes:
      - worker-workdir:/workspace

volumes:
  bazel-remote-data:
  redis-data:
  worker-workdir:
