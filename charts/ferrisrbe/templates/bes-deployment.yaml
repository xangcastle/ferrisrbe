{{- if .Values.bes.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ferrisrbe.fullname" . }}-bes
  namespace: {{ include "ferrisrbe.namespace" . }}
  labels:
    app.kubernetes.io/component: bes
    {{- include "ferrisrbe.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.bes.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/component: bes
      {{- include "ferrisrbe.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: bes
        {{- include "ferrisrbe.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ferrisrbe.serviceAccountName" . }}
      containers:
        - name: bes
          image: "{{ .Values.bes.image.repository }}:{{ .Values.bes.image.tag }}"
          imagePullPolicy: {{ .Values.bes.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.bes.service.grpcPort }}
              protocol: TCP
            - name: ui
              containerPort: {{ .Values.bes.service.uiPort }}
              protocol: TCP
          env:
            - name: RUST_LOG
              value: {{ .Values.config.rustLog | quote }}
            - name: RBE_BES_PORT
              value: {{ .Values.bes.service.grpcPort | quote }}
            - name: RBE_BES_UI_PORT
              value: {{ .Values.bes.service.uiPort | quote }}
            - name: RBE_BES_BIND_ADDRESS
              value: "0.0.0.0"
            - name: RBE_BES_DATA_DIR
              value: "/data/bes"
            - name: RBE_BES_STATIC_DIR
              value: "/app/ui/dist"
            {{- with .Values.bes.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.bes.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data/bes
            - name: tmp
              mountPath: /tmp
          {{- if .Values.bes.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: {{ .Values.bes.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.bes.livenessProbe.periodSeconds }}
          {{- end }}
          {{- if .Values.bes.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: {{ .Values.bes.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.bes.readinessProbe.periodSeconds }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          {{- if .Values.bes.storage.storageClass }}
          persistentVolumeClaim:
            claimName: {{ include "ferrisrbe.fullname" . }}-bes
          {{- else }}
          emptyDir:
            sizeLimit: {{ .Values.bes.storage.size }}
          {{- end }}
      nodeSelector:
        {{- toYaml .Values.bes.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.bes.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.bes.affinity | nindent 8 }}
{{- end }}
