{{- if .Values.cache.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ferrisrbe.fullname" . }}-cache
  namespace: {{ include "ferrisrbe.namespace" . }}
  labels:
    app.kubernetes.io/component: cache
    {{- include "ferrisrbe.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: cache
      {{- include "ferrisrbe.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: cache
        {{- include "ferrisrbe.selectorLabels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      containers:
        - name: cache
          image: "{{ .Values.cache.image.repository }}:{{ .Values.cache.image.tag }}"
          imagePullPolicy: {{ .Values.cache.image.pullPolicy }}
          env:
            - name: RUST_LOG
              value: {{ .Values.config.rustLog | quote }}
            - name: RBE_CACHE_PORT
              value: {{ .Values.cache.service.grpcPort | quote }}
            - name: RBE_CACHE_HTTP_PORT
              value: {{ .Values.cache.service.httpPort | quote }}
            - name: RBE_CACHE_DIR
              value: "/data"
            - name: RBE_CACHE_MAX_SIZE_GB
              value: {{ .Values.cache.maxSizeGb | quote }}
            - name: RBE_CACHE_AC_MAX_SIZE_GB
              value: {{ .Values.cache.acMaxSizeGb | quote }}
          ports:
            - name: grpc
              containerPort: {{ .Values.cache.service.grpcPort }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.cache.service.httpPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.cache.resources | nindent 12 }}
          volumeMounts:
            - name: cache
              mountPath: /data
          {{- if .Values.cache.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: {{ .Values.cache.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.cache.livenessProbe.periodSeconds }}
          {{- end }}
          {{- if .Values.cache.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: {{ .Values.cache.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.cache.readinessProbe.periodSeconds }}
          {{- end }}
      volumes:
        - name: cache
          {{- if .Values.cache.storage.storageClass }}
          persistentVolumeClaim:
            claimName: {{ include "ferrisrbe.fullname" . }}-cache
          {{- else }}
          emptyDir:
            sizeLimit: {{ .Values.cache.storage.size }}
          {{- end }}
{{- end }}
