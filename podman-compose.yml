version: '3.8'

# Podman Compose stack for local FerrisRBE development.
# Images must be built and loaded with Bazel first:
#
#   bazel run //oci:server.arm64.load
#   bazel run //oci:worker.arm64.load
#   bazel run //oci:cache.arm64.load
#
# Then start the stack:
#   podman-compose -f podman-compose.yml up -d

services:
  cache:
    image: localhost/ferrisrbe/cache:latest
    ports:
      - "9094:9094"
      - "8080:8080"
    volumes:
      - ./.cache:/data
    environment:
      - RUST_LOG=info
      - RBE_CACHE_PORT=9094
      - RBE_CACHE_HTTP_PORT=8080
      - RBE_CACHE_DIR=/data
      - RBE_CACHE_MAX_SIZE_GB=10
      - RBE_CACHE_AC_MAX_SIZE_GB=2
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  server:
    image: localhost/ferrisrbe/server:latest
    ports:
      - "9092:9092"
    environment:
      - RBE_PORT=9092
      - RBE_BIND_ADDRESS=0.0.0.0
      - RUST_LOG=info
      - CAS_ENDPOINT=cache:9094
      - RBE_L1_CACHE_CAPACITY=100000
    depends_on:
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "bash -c '</dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  worker:
    image: localhost/ferrisrbe/worker:latest
    environment:
      - WORKER_ID=worker-local
      - SERVER_ENDPOINT=http://server:9092
      - CAS_ENDPOINT=http://cache:9094
      - RUST_LOG=info
      - MAX_CONCURRENT=4
      - WORKER_TYPE=default
      - WORKER_LABELS=os=linux,arch=amd64
      - RBE_ALLOW_SYSTEM_EXECUTABLES=1
    depends_on:
      server:
        condition: service_healthy
    deploy:
      replicas: 2
    volumes:
      - worker-workdir:/workspace
    healthcheck:
      test: ["CMD-SHELL", "grep -qa /app/worker /proc/*/cmdline"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  bes:
    image: localhost/ferrisrbe/bes:latest
    ports:
      - "9095:9095"
      - "9096:9096"
    volumes:
      - ./.bes:/data/bes
      - ./ui/dist:/app/ui/dist
    environment:
      - RUST_LOG=info
      - RBE_BES_PORT=9095
      - RBE_BES_UI_PORT=9096
      - RBE_BES_BIND_ADDRESS=0.0.0.0
      - RBE_BES_DATA_DIR=/data/bes
      - RBE_BES_STATIC_DIR=/app/ui/dist
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9096'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  worker-workdir:
  bes-data:
