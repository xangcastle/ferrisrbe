# Railway deployment configuration - REMOTE CACHE ONLY
# 
# This deploys only the FerrisRBE server for Remote Cache functionality.
# Remote Execution requires workers which are not deployed in Railway (use Docker Compose or Kubernetes for full RBE).
#
# Deploy: railway service create ferrisrbe-cache --source railway

[deploy]
image = "xangcastle/ferris-server:latest"
startCommand = "/app/rbe_server"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.env]
RBE_PORT = "${PORT}"
RBE_BIND_ADDRESS = "0.0.0.0"
RUST_LOG = "info"
# Cache-only mode - no external Redis or CAS required
# Uses in-memory L1 Action Cache (DashMap) and local filesystem CAS
