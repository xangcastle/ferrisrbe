apiVersion: v1
kind: Namespace
metadata:
  name: rbe
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbe-server
  namespace: rbe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rbe-server
  template:
    metadata:
      labels:
        app: rbe-server
    spec:
      containers:
        - name: server
          image: xangcastle/ferris-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
          env:
            - name: RUST_LOG
              value: "info"
            - name: CAS_ENDPOINT
              value: "rbe-cache:9094"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rbe-server
  namespace: rbe
spec:
  type: NodePort
  ports:
    - port: 9092
      targetPort: 9092
      nodePort: 30092
  selector:
    app: rbe-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbe-worker
  namespace: rbe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rbe-worker
  template:
    metadata:
      labels:
        app: rbe-worker
    spec:
      containers:
        - name: worker
          image: xangcastle/ferris-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RUST_LOG
              value: "info"
            - name: SERVER_ENDPOINT
              value: "http://rbe-server:9092"
            - name: CAS_ENDPOINT
              value: "http://rbe-cache:9094"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
# rbe-cache: FerrisRBE native cache server (replaces bazel-remote-cache)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbe-cache
  namespace: rbe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rbe-cache
  template:
    metadata:
      labels:
        app: rbe-cache
    spec:
      enableServiceLinks: false
      containers:
        - name: rbe-cache
          image: xangcastle/ferris-cache:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RUST_LOG
              value: "info"
            - name: RBE_CACHE_PORT
              value: "9094"
            - name: RBE_CACHE_HTTP_PORT
              value: "8080"
            - name: RBE_CACHE_DIR
              value: "/data"
            - name: RBE_CACHE_MAX_SIZE_GB
              value: "10"
            - name: RBE_CACHE_AC_MAX_SIZE_GB
              value: "2"
          ports:
            - containerPort: 9094
              name: grpc
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rbe-cache
  namespace: rbe
spec:
  ports:
    - port: 9094
      targetPort: grpc
      name: grpc
    - port: 8080
      targetPort: http
      name: http
  selector:
    app: rbe-cache
---
# rbe-bes: Build Event Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbe-bes
  namespace: rbe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rbe-bes
  template:
    metadata:
      labels:
        app: rbe-bes
    spec:
      containers:
        - name: rbe-bes
          image: xangcastle/ferris-bes:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RUST_LOG
              value: "info"
            - name: RBE_BES_PORT
              value: "9095"
            - name: RBE_BES_UI_PORT
              value: "9096"
            - name: RBE_BES_BIND_ADDRESS
              value: "0.0.0.0"
            - name: RBE_BES_DATA_DIR
              value: "/data/bes"
            - name: RBE_BES_STATIC_DIR
              value: "/app/ui/dist"
          ports:
            - containerPort: 9095
              name: grpc
            - containerPort: 9096
              name: ui
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /data/bes
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rbe-bes
  namespace: rbe
spec:
  type: NodePort
  ports:
    - port: 9096
      targetPort: ui
      nodePort: 30096
      name: ui
  selector:
    app: rbe-bes
