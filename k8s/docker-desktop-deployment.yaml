apiVersion: v1
kind: Namespace
metadata:
  name: rbe
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbe-server
  namespace: rbe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rbe-server
  template:
    metadata:
      labels:
        app: rbe-server
    spec:
      containers:
        - name: server
          image: rbe-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9092
          env:
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rbe-server
  namespace: rbe
spec:
  type: NodePort
  ports:
    - port: 9092
      targetPort: 9092
      nodePort: 30092
  selector:
    app: rbe-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbe-worker
  namespace: rbe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rbe-worker
  template:
    metadata:
      labels:
        app: rbe-worker
    spec:
      containers:
        - name: worker
          image: rbe-worker:latest
          imagePullPolicy: Never
          env:
            - name: RUST_LOG
              value: "info"
            - name: SERVER_ENDPOINT
              value: "http://rbe-server:9092"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
# rbe-cache: FerrisRBE native cache server (replaces bazel-remote-cache)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbe-cache
  namespace: rbe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rbe-cache
  template:
    metadata:
      labels:
        app: rbe-cache
    spec:
      enableServiceLinks: false  # Disable K8s service env injection
      containers:
        - name: rbe-cache
          image: ferrisrbe/cache:latest
          imagePullPolicy: Never
          env:
            - name: RUST_LOG
              value: "info"
            - name: RBE_CACHE_PORT
              value: "9094"
            - name: RBE_CACHE_HTTP_PORT
              value: "8080"
            - name: RBE_CACHE_DIR
              value: "/data"
            - name: RBE_CACHE_MAX_SIZE_GB
              value: "10"
            - name: RBE_CACHE_AC_MAX_SIZE_GB
              value: "2"
          ports:
            - containerPort: 9094
              name: grpc
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rbe-cache
  namespace: rbe
spec:
  ports:
    - port: 9094
      targetPort: grpc
      name: grpc
    - port: 8080
      targetPort: http
      name: http
  selector:
    app: rbe-cache

