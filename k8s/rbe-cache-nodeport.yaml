# NodePort service for rbe-cache
# This allows direct access without kubectl port-forward
apiVersion: v1
kind: Service
metadata:
  name: rbe-cache-external
  namespace: rbe
  labels:
    app: rbe-cache
spec:
  type: NodePort
  ports:
    - port: 9094
      targetPort: grpc
      nodePort: 30094
      protocol: TCP
      name: grpc
    - port: 8080
      targetPort: http
      nodePort: 30080
      protocol: TCP
      name: http
  selector:
    app: rbe-cache
