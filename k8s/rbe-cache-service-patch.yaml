apiVersion: v1
kind: Service
metadata:
  name: rbe-cache
  namespace: rbe
  labels:
    app: rbe-cache
spec:
  type: NodePort
  ports:
    - port: 9094
      targetPort: grpc
      protocol: TCP
      name: grpc
      nodePort: 30094
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
      nodePort: 30080
  selector:
    app: rbe-cache
