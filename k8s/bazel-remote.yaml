apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bazel-remote
  namespace: rbe
  labels:
    app: bazel-remote
spec:
  serviceName: bazel-remote
  replicas: 1
  selector:
    matchLabels:
      app: bazel-remote
  template:
    metadata:
      labels:
        app: bazel-remote
    spec:
      enableServiceLinks: false
      containers:
        - name: bazel-remote
          image: buchgr/bazel-remote-cache:latest
          args:
            - --max_size=100
            - --dir=/data
            - --grpc_address=:9094
            - --http_address=:8080
          ports:
            - name: grpc
              containerPort: 9094
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "2000m"
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 200Gi
---
apiVersion: v1
kind: Service
metadata:
  name: bazel-remote
  namespace: rbe
  labels:
    app: bazel-remote
spec:
  type: ClusterIP
  ports:
    - port: 9094
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: bazel-remote
