apiVersion: v1
kind: Service
metadata:
  name: bazel-remote
  namespace: rbe
  labels:
    app: bazel-remote
spec:
  type: NodePort
  ports:
    - port: 9094
      targetPort: grpc
      protocol: TCP
      name: grpc
      nodePort: 30094
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
      nodePort: 31344
  selector:
    app: bazel-remote
