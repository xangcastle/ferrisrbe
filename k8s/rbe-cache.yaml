apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rbe-cache
  namespace: rbe
  labels:
    app: rbe-cache
spec:
  serviceName: rbe-cache
  replicas: 1
  selector:
    matchLabels:
      app: rbe-cache
  template:
    metadata:
      labels:
        app: rbe-cache
    spec:
      enableServiceLinks: false
      containers:
        - name: rbe-cache
          image: xangcastle/ferris-cache:latest
          env:
            - name: RUST_LOG
              value: "info"
            - name: RBE_CACHE_PORT
              value: "9094"
            - name: RBE_CACHE_HTTP_PORT
              value: "8080"
            - name: RBE_CACHE_DIR
              value: "/data"
            - name: RBE_CACHE_MAX_SIZE_GB
              value: "100"
            - name: RBE_CACHE_AC_MAX_SIZE_GB
              value: "10"
          ports:
            - name: grpc
              containerPort: 9094
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "2000m"
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 200Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rbe-cache
  namespace: rbe
  labels:
    app: rbe-cache
spec:
  type: ClusterIP
  ports:
    - port: 9094
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: rbe-cache
