# BuildBuddy - Benchmark Configuration
# CAS/AC benchmark only; RBE executor disabled to avoid Redis dependency.
# Reference: https://github.com/buildbuddy-io/buildbuddy
version: "3.8"

services:
  # === BUILDBUDDY SERVER ===
  buildbuddy-server:
    image: gcr.io/flame-public/buildbuddy-app-enterprise:latest
    container_name: buildbuddy-server
    ports:
      - "9092:1985"      # REAPI gRPC (mapped to standard port)
      - "8080:8080"      # Web UI
      - "9093:9093"      # Prometheus metrics
    volumes:
      - ./config/buildbuddy-config.yaml:/config/buildbuddy.yaml:ro
      - buildbuddy-data:/data
    command: ["/app/enterprise/server", "--config_file=/config/buildbuddy.yaml"]
    networks:
      - benchmark-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M

volumes:
  buildbuddy-data:

networks:
  benchmark-network:
    driver: bridge
