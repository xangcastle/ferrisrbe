global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    monitor: 'benchmark'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # cAdvisor - Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      - source_labels: [name]
        target_label: container_name

  # Node Exporter - Host metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # FerrisRBE Server Metrics
  - job_name: 'ferrisrbe-server'
    static_configs:
      - targets: ['ferrisrbe-server:9093']
    metrics_path: /metrics

  # FerrisRBE via cAdvisor (fallback)
  - job_name: 'ferrisrbe-cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    relabel_configs:
      - source_labels: [__name__]
        regex: 'container_memory_usage_bytes|container_cpu_usage_seconds_total'
        action: keep

  # Buildfarm Server (JMX if available)
  - job_name: 'buildfarm-server'
    static_configs:
      - targets: ['buildfarm-server:9093']

  # BuildBuddy Metrics
  - job_name: 'buildbuddy-server'
    static_configs:
      - targets: ['buildbuddy-server:9093']

  # Custom benchmark metrics
  - job_name: 'benchmark-results'
    static_configs:
      - targets: ['host.docker.internal:9096']
    metrics_path: /benchmark-metrics
