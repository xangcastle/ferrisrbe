name: CI

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - 'proto/**'
      - 'oci/**'
      - 'charts/**'
      - 'k8s/**'
      - 'benchmark/**'
      - 'examples/**'
      - '.github/workflows/pull-request.yml'
  workflow_dispatch:
    inputs:
      benchmark_all:
        description: 'Run full benchmark suite'
        required: false
        default: 'false'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: rustfmt --edition 2021 --check $(find src -name "*.rs")

  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/Cargo.lock', '**/MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Run clippy
        run: |
          bazel build --aspects=@rules_rust//rust:defs.bzl%rust_clippy_aspect \
            --output_groups=+clippy_checks //:server //:worker //:cache //:bes 2>&1 || true

  ci:
    name: Build, Test, Images, Integration and Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          podman --version

      - name: Use Podman for OCI image loading
        run: |
          # rules_oci oci_load prefers 'docker' over 'podman'. Make 'docker'
          # resolve to podman so images are loaded into the Podman store.
          sudo ln -sf $(command -v podman) /usr/local/bin/docker
          docker --version

      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/Cargo.lock', '**/MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Build binaries
        run: bazel build //:server //:worker //:cache //:bes

      - name: Run tests
        run: bazel test //...

      - name: Build and load images
        run: |
          for image in server worker cache bes; do
            echo "=== Building ${image} ==="
            bazel run "//oci:${image}.amd64.image.load"
          done
          echo "=== Images built ==="
          podman images | grep ferrisrbe || true

      - name: Install Kind
        uses: helm/kind-action@v1
        with:
          version: v0.22.0
          cluster_name: ferrisrbe-test

      - name: Load images into Kind
        run: |
          podman save ferrisrbe/server:latest | kind load image-archive - --name ferrisrbe-test
          podman save ferrisrbe/worker:latest | kind load image-archive - --name ferrisrbe-test
          podman save ferrisrbe/cache:latest | kind load image-archive - --name ferrisrbe-test
          podman save ferrisrbe/bes:latest | kind load image-archive - --name ferrisrbe-test
          echo "=== Verify images in Kind ==="
          kubectl get nodes -o json | jq -r '.items[0].status.images[] | select(.names[] | contains("ferrisrbe")) | .names[0]' || true

      - name: Deploy to Kind
        run: |
          helm install ferrisrbe ./charts/ferrisrbe --namespace rbe --create-namespace \
            --set server.image.repository=ferrisrbe/server \
            --set server.image.pullPolicy=Never \
            --set worker.image.repository=ferrisrbe/worker \
            --set worker.image.pullPolicy=Never \
            --set cache.image.repository=ferrisrbe/cache \
            --set cache.image.pullPolicy=Never \
            --set bes.image.repository=ferrisrbe/bes \
            --set bes.image.pullPolicy=Never \
            --set server.livenessProbe.enabled=false \
            --set server.readinessProbe.enabled=false \
            --set worker.livenessProbe.enabled=false \
            --set worker.readinessProbe.enabled=false

      - name: Debug - Check all resources
        run: |
          sleep 10
          echo "=== All pods ==="
          kubectl get pods -n rbe
          echo "=== All deployments ==="
          kubectl get deployments -n rbe
          echo "=== All replica sets ==="
          kubectl get rs -n rbe
          echo "=== Events ==="
          kubectl get events -n rbe --sort-by='.lastTimestamp' | tail -30
          echo "=== Describe server deployment ==="
          kubectl describe deployment ferrisrbe-server -n rbe || true
          echo "=== Describe worker deployment ==="
          kubectl describe deployment ferrisrbe-worker -n rbe || true
          echo "=== Describe BES deployment ==="
          kubectl describe deployment ferrisrbe-bes -n rbe || true

      - name: Wait for deployment
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=cache -n rbe --timeout=60s
          kubectl rollout status deployment/ferrisrbe-server -n rbe --timeout=120s || {
            echo "=== Server deployment failed ==="
            kubectl get pods -n rbe
            echo "=== Server pod logs ==="
            kubectl logs -l app.kubernetes.io/component=server -n rbe --tail=50 || true
            echo "=== Server pod previous logs ==="
            kubectl logs -l app.kubernetes.io/component=server -n rbe --tail=50 --previous || true
            echo "=== Describe server pod ==="
            kubectl describe pod -l app.kubernetes.io/component=server -n rbe || true
            exit 1
          }
          kubectl rollout status deployment/ferrisrbe-worker -n rbe --timeout=120s || {
            echo "=== Worker deployment failed ==="
            kubectl get pods -n rbe
            kubectl describe deployment ferrisrbe-worker -n rbe
            kubectl logs -l app.kubernetes.io/component=worker -n rbe --tail=100 || true
            exit 1
          }
          kubectl rollout status deployment/ferrisrbe-bes -n rbe --timeout=120s || {
            echo "=== BES deployment failed ==="
            kubectl get pods -n rbe
            kubectl describe deployment ferrisrbe-bes -n rbe
            kubectl logs -l app.kubernetes.io/component=bes -n rbe --tail=100 || true
            exit 1
          }

      - name: Port forward
        run: |
          kubectl port-forward -n rbe svc/ferrisrbe-server 9092:9092 &
          kubectl port-forward -n rbe svc/ferrisrbe-cache 9094:9094 &
          echo "Waiting for port-forward to be ready..."
          sleep 10
          # Verify ports are listening
          netstat -tlnp 2>/dev/null | grep -E '9092|9094' || ss -tlnp | grep -E '9092|9094' || true

      - name: Test cache
        run: |
          cd examples/bazel-7.4
          bazel build //:cacheable_step --config=remote-cache

      - name: Cleanup Kind
        if: always()
        run: |
          kind delete cluster --name ferrisrbe-test || true

      - name: Run benchmark suite
        id: benchmark
        run: |
          bazel run //benchmark:run -- full --cache-image ferrisrbe/cache:latest
        continue-on-error: true

      - name: Compare PR vs official release
        id: compare
        run: |
          bazel run //benchmark:run -- compare --image ferrisrbe/server:latest
        continue-on-error: true

      - name: Check regression thresholds
        id: regression
        run: |
          bazel run //benchmark/scripts:check_regression -- benchmark/results/benchmark_data.json
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-pr
          path: benchmark/results/
          retention-days: 30

      - name: Write benchmark summary
        if: always()
        run: |
          if [ -f benchmark/results/benchmark_summary.md ]; then
            cat benchmark/results/benchmark_summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Benchmark failed to complete." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post benchmark PR comment
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const MARKER = '<!-- ferrisrbe-benchmark-report -->';

            // --- Benchmark results section ---
            let benchSection = '';
            const summaryPath = 'benchmark/results/benchmark_summary.md';
            if (fs.existsSync(summaryPath)) {
              benchSection = fs.readFileSync(summaryPath, 'utf8').trim();
            } else {
              benchSection = '❌ Benchmark suite did not produce a summary. Check the workflow logs.';
            }

            // --- Comparison section ---
            let compareSection = '';
            const comparisonPath = 'benchmark/results/comparison.md';
            if (fs.existsSync(comparisonPath)) {
              // Strip a leading H2 if comparison.md already starts with one to avoid duplication
              compareSection = fs.readFileSync(comparisonPath, 'utf8')
                .trim()
                .replace(/^##\s+.*\n/, '');
            } else {
              compareSection = '_Comparison against official release not available._';
            }

            // --- Regression section ---
            const regressionFailed = '${{ steps.regression.outcome }}' === 'failure';
            let regressionSection = '';
            const failedPath = 'benchmark/results/failed_metrics.json';
            if (regressionFailed && fs.existsSync(failedPath)) {
              const failed = JSON.parse(fs.readFileSync(failedPath, 'utf8'));
              regressionSection += '> ⚠️ **Regression detected** — the following metrics exceeded their thresholds:\n\n';
              regressionSection += '| Metric | Actual | Threshold | Unit |\n';
              regressionSection += '|--------|--------|-----------|------|\n';
              for (const [metric, info] of Object.entries(failed)) {
                regressionSection += `| **${metric}** | ${info.value} | ${info.threshold} | ${info.unit} |\n`;
              }
            } else if (regressionFailed) {
              regressionSection = '> ⚠️ **Regression check failed** — see workflow logs for details.';
            } else {
              regressionSection = '> ✅ All metrics within acceptable thresholds.';
            }

            // --- Assemble single comment ---
            const runUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            const body = [
              MARKER,
              '## 📊 FerrisRBE Benchmark Report',
              '',
              benchSection,
              '',
              '---',
              '### Comparison vs Official Release (`xangcastle/ferris-server:latest`)',
              '',
              compareSection,
              '',
              '---',
              '### Regression Check',
              '',
              regressionSection,
              '',
              '---',
              `_Commit: \`${{ github.sha }}\` · [Full logs and artifacts](${runUrl})_`,
            ].join('\n');

            const issueNumber = context.issue.number || context.payload.pull_request?.number;
            if (!issueNumber) { console.log('No PR number, skipping'); return; }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const existing = comments.find(c => c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log('Updated existing benchmark comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
              console.log('Created new benchmark comment');
            }
