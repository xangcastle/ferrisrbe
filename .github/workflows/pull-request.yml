name: Pull Request Checks

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/Cargo.lock', '**/MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Run clippy
        run: |
          bazel build --aspects=@rules_rust//rust:defs.bzl%rust_clippy_aspect \
            --output_groups=+clippy_checks //:rbe-server //:rbe-worker 2>&1 || true
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/Cargo.lock', '**/MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Build binaries
        run: |
          bazel build //:rbe-server //:rbe-worker

      - name: Build container images
        run: |
          bazel build //oci:server_image_amd64 //oci:worker_image_amd64



  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/Cargo.lock', '**/MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Run tests
        run: |
          bazel test //...


  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v3

      - name: Install Kind
        uses: helm/kind-action@v1
        with:
          version: v0.22.0
          cluster_name: ferrisrbe-test

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/Cargo.lock', '**/MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Build and load AMD64 images
        run: |
          # Build and load AMD64 images for CI (GitHub Actions is AMD64)
          bazel run //oci:server_load_amd64
          bazel run //oci:worker_load_amd64
          
          echo "=== Docker images ==="
          docker images | grep ferrisrbe || true
          echo "=== Image architecture ==="
          docker inspect ferrisrbe/server:latest | grep Architecture || true
          
      - name: Load images to Kind
        run: |
          kind load docker-image ferrisrbe/server:latest --name ferrisrbe-test
          kind load docker-image ferrisrbe/worker:latest --name ferrisrbe-test
          echo "=== Verify images in Kind ==="
          kubectl get nodes -o json | jq -r '.items[0].status.images[] | select(.names[] | contains("ferrisrbe")) | .names[0]' || true

      - name: Deploy to Kind
        run: |
          helm install ferrisrbe ./charts/ferrisrbe --namespace rbe --create-namespace \
            --set server.image.repository=ferrisrbe/server \
            --set server.image.pullPolicy=Never \
            --set worker.image.repository=ferrisrbe/worker \
            --set worker.image.pullPolicy=Never \
            --set server.livenessProbe.enabled=false \
            --set server.readinessProbe.enabled=false \
            --set worker.livenessProbe.enabled=false \
            --set worker.readinessProbe.enabled=false

      - name: Debug - Check all resources
        run: |
          sleep 10
          echo "=== All pods ==="
          kubectl get pods -n rbe
          echo "=== All deployments ==="
          kubectl get deployments -n rbe
          echo "=== All replica sets ==="
          kubectl get rs -n rbe
          echo "=== Events ==="
          kubectl get events -n rbe --sort-by='.lastTimestamp' | tail -30
          echo "=== Describe server deployment ==="
          kubectl describe deployment ferrisrbe-server -n rbe || true
          echo "=== Describe worker deployment ==="
          kubectl describe deployment ferrisrbe-worker -n rbe || true

      - name: Wait for deployment
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=redis -n rbe --timeout=60s
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=bazel-remote -n rbe --timeout=60s
          kubectl rollout status deployment/ferrisrbe-server -n rbe --timeout=120s || {
            echo "=== Server deployment failed ==="
            kubectl get pods -n rbe
            echo "=== Server pod logs ==="
            kubectl logs -l app.kubernetes.io/component=server -n rbe --tail=50 || true
            echo "=== Server pod previous logs ==="
            kubectl logs -l app.kubernetes.io/component=server -n rbe --tail=50 --previous || true
            echo "=== Describe server pod ==="
            kubectl describe pod -l app.kubernetes.io/component=server -n rbe || true
            exit 1
          }
          kubectl rollout status deployment/ferrisrbe-worker -n rbe --timeout=120s || {
            echo "=== Worker deployment failed ==="
            kubectl get pods -n rbe
            kubectl describe deployment ferrisrbe-worker -n rbe
            kubectl logs -l app.kubernetes.io/component=worker -n rbe --tail=100 || true
            exit 1
          }

      - name: Port forward
        run: |
          kubectl port-forward -n rbe svc/ferrisrbe-server 9092:9092 &
          kubectl port-forward -n rbe svc/ferrisrbe-bazel-remote 9094:9094 &
          echo "Waiting for port-forward to be ready..."
          sleep 10
          # Verify ports are listening
          netstat -tlnp 2>/dev/null | grep -E '9092|9094' || ss -tlnp | grep -E '9092|9094' || true

      - name: Test cache
        run: |
          cd examples/bazel-7.4
          bazel build //:cacheable_step --config=remote-cache

      - name: Cleanup
        if: always()
        run: |
          kind delete cluster --name ferrisrbe-test || true
