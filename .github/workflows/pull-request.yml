name: Pull Request Checks

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/Cargo.lock', '**/MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Run clippy
        run: |
          bazel build --aspects=@rules_rust//rust:defs.bzl%rust_clippy_aspect \
            --output_groups=+clippy_checks //:rbe-server //:rbe-worker 2>&1 || true
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/Cargo.lock', '**/MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Build binaries
        run: |
          bazel build //:rbe-server //:rbe-worker

      - name: Build container images
        run: |
          bazel build //oci:server_image_amd64 //oci:worker_image_amd64



  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/Cargo.lock', '**/MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Run tests
        run: |
          bazel test //...


  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v3

      - name: Install Kind
        uses: helm/kind-action@v1
        with:
          version: v0.22.0
          cluster_name: ferrisrbe-test

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/Cargo.lock', '**/MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Build and load images
        run: |
          bazel run //oci:server_load //oci:worker_load
          kind load docker-image ferrisrbe/server:latest ferrisrbe/worker:latest --name ferrisrbe-test

      - name: Deploy to Kind
        run: |
          helm install ferrisrbe ./charts/ferrisrbe --namespace rbe --create-namespace \
            --set server.image.repository=ferrisrbe/server \
            --set server.image.pullPolicy=Never \
            --set worker.image.repository=ferrisrbe/worker \
            --set worker.image.pullPolicy=Never \
            --wait --timeout=2m

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/ferrisrbe-server -n rbe --timeout=60s
          kubectl rollout status deployment/ferrisrbe-worker -n rbe --timeout=60s

      - name: Port forward
        run: |
          kubectl port-forward -n rbe svc/ferrisrbe-server 9092:9092 &
          kubectl port-forward -n rbe svc/ferrisrbe-bazel-remote 9094:9094 &
          sleep 5

      - name: Test cache
        run: |
          cd examples/bazel-7.4
          bazel build //:cacheable_step --config=remote-cache

      - name: Cleanup
        if: always()
        run: |
          kind delete cluster --name ferrisrbe-test || true
