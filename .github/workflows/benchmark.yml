name: Performance Benchmarks

on:
  # Use pull_request_target for PRs from forks (runs in base repo context with more permissions)
  # SECURITY: Only checkout trusted code when using this event
  pull_request_target:
    branches: [ main, master ]
    types: [ opened, synchronize, reopened ]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'benchmark/**'
      - '.github/workflows/benchmark.yml'
  # Also trigger on regular pull_request for PRs within the same repo
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'benchmark/**'
      - '.github/workflows/benchmark.yml'
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      benchmark_all:
        description: 'Run full benchmark suite (slower)'
        required: false
        default: 'false'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build FerrisRBE for benchmarking
  build:
    name: Build for Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
      
      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: benchmark-${{ runner.os }}
      
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      
      - name: Build release binary
        run: cargo build --release --bin rbe-server
      
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: rbe-server-binary
          path: target/release/rbe-server
          retention-days: 1

  # Run lightweight benchmarks on PR
  benchmark-pr:
    name: Benchmark PR (Lightweight)
    runs-on: ubuntu-latest
    needs: build
    # Run on both pull_request (internal PRs) and pull_request_target (fork PRs)
    # Skip if manually triggering full benchmarks
    if: (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.inputs.benchmark_all != 'true'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    # Use GitHub Actions services for bazel-remote (CAS)
    services:
      bazel-remote:
        image: buchgr/bazel-remote-cache:latest
        ports:
          - 9094:9094
          - 8080:8080
        env:
          BAZEL_REMOTE_GRPC_PORT: 9094
          BAZEL_REMOTE_HTTP_PORT: 8080
          BAZEL_REMOTE_DIR: /data
          BAZEL_REMOTE_MAX_SIZE: 1
        options: >-
          --health-cmd "nc -z localhost 9094 || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    
    env:
      # Point server to the service
      CAS_ENDPOINT: localhost:9094
      # Disable standalone mode since we're using services
      BENCHMARK_SERVICES: 1
    
    steps:
      # SECURITY NOTE: When using pull_request_target, checkout the PR code explicitly
      # This is safe here because we only run benchmarks, not build/deploy
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: rbe-server-binary
          path: ./target/release/
      
      - name: Make binary executable
        run: chmod +x ./target/release/rbe-server
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip bc netcat-openbsd
          pip3 install grpcio grpcio-tools
      
      - name: Run lightweight benchmark suite
        id: benchmark
        run: |
          cd benchmark
          ./scripts/benchmark-ci.sh light
        continue-on-error: true
        
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-pr
          path: benchmark/results/
          retention-days: 30
      
      - name: Create benchmark report
        if: always()
        run: |
          echo "## 📊 Benchmark Report" >> $GITHUB_STEP_SUMMARY
          if [ -f benchmark/results/benchmark_summary.md ]; then
            cat benchmark/results/benchmark_summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Benchmark failed to complete. Check logs for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: always() && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'benchmark/results/benchmark_summary.md';
            
            let body = '## 🚀 Performance Benchmark Results\n\n';
            
            if (fs.existsSync(path)) {
              const summary = fs.readFileSync(path, 'utf8');
              body += summary;
            } else {
              body += '❌ Benchmark failed to complete. Check logs for details.';
            }
            
            // Get the PR number from the appropriate event payload
            const issueNumber = context.issue.number || context.payload.pull_request.number;
            
            if (!issueNumber) {
              console.log('No PR number found, skipping comment');
              return;
            }
            
            try {
              // Find existing comment
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });
              
              const benchmarkComment = comments.find(comment => 
                comment.body.includes('Performance Benchmark Results')
              );
              
              if (benchmarkComment) {
                // Update existing comment
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: benchmarkComment.id,
                  body: body
                });
                console.log('Updated existing comment');
              } else {
                // Create new comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: body
                });
                console.log('Created new comment');
              }
            } catch (error) {
              console.log('Could not post comment (permissions issue):', error.message);
              console.log('Results are available in the workflow summary and artifacts.');
            }

  # Run full benchmarks on main branch or manual trigger
  benchmark-full:
    name: Benchmark Full Suite
    runs-on: ubuntu-latest-8-core  # Larger runner for full benchmarks
    needs: build
    if: github.event_name == 'push' || github.event.inputs.benchmark_all == 'true'
    permissions:
      contents: read
    
    # Use GitHub Actions services for bazel-remote (CAS)
    services:
      bazel-remote:
        image: buchgr/bazel-remote-cache:latest
        ports:
          - 9094:9094
          - 8080:8080
        env:
          BAZEL_REMOTE_GRPC_PORT: 9094
          BAZEL_REMOTE_HTTP_PORT: 8080
          BAZEL_REMOTE_DIR: /data
          BAZEL_REMOTE_MAX_SIZE: 1
        options: >-
          --health-cmd "nc -z localhost 9094 || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    
    env:
      CAS_ENDPOINT: localhost:9094
      BENCHMARK_SERVICES: 1
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for comparison
      
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: rbe-server-binary
          path: ./target/release/
      
      - name: Make binary executable
        run: chmod +x ./target/release/rbe-server
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip bc netcat-openbsd
          pip3 install grpcio grpcio-tools
      
      - name: Run full benchmark suite
        run: |
          cd benchmark
          ./scripts/benchmark-ci.sh full
      
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark/results/benchmark_data.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'  # Fail if 50% slower
          comment-on-alert: true
          fail-on-alert: true
      
      - name: Upload detailed results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-full
          path: benchmark/results/
          retention-days: 90

  # Compare PR against main branch
  benchmark-compare:
    name: Compare Against Main
    runs-on: ubuntu-latest
    needs: [build, benchmark-pr]
    if: (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.inputs.benchmark_all != 'true'
    permissions:
      contents: read
      pull-requests: write
    
    # Use GitHub Actions services for bazel-remote (CAS)
    services:
      bazel-remote:
        image: buchgr/bazel-remote-cache:latest
        ports:
          - 9094:9094
          - 8080:8080
        env:
          BAZEL_REMOTE_GRPC_PORT: 9094
          BAZEL_REMOTE_HTTP_PORT: 8080
          BAZEL_REMOTE_DIR: /data
          BAZEL_REMOTE_MAX_SIZE: 1
        options: >-
          --health-cmd "nc -z localhost 9094 || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    
    env:
      CAS_ENDPOINT: localhost:9094
      BENCHMARK_SERVICES: 1
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch
      
      - uses: actions/checkout@v4
        with:
          path: pr-branch
      
      - name: Download PR benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-pr
          path: pr-results/
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install grpcio grpcio-tools
      
      - name: Build main branch binary
        working-directory: main-branch
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          cargo build --release --bin rbe-server
      
      - name: Run comparison benchmark
        id: compare
        run: |
          cd pr-branch/benchmark
          ./scripts/compare-branches.sh \
            ../../main-branch/target/release/rbe-server \
            ../../pr-branch/target/release/rbe-server
      
      - name: Comment PR with comparison
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comparisonPath = 'pr-branch/benchmark/results/comparison.md';
            
            if (!fs.existsSync(comparisonPath)) {
              console.log('No comparison file found');
              return;
            }
            
            const comparison = fs.readFileSync(comparisonPath, 'utf8');
            
            // Find existing comparison comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const comparisonComment = comments.find(comment => 
              comment.body.includes('Performance Comparison')
            );
            
            const body = `## 📊 Performance Comparison: PR vs Main\n\n${comparison}`;
            
            if (comparisonComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comparisonComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # Performance regression check
  regression-check:
    name: Check for Regressions
    runs-on: ubuntu-latest
    needs: benchmark-pr
    if: (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.inputs.benchmark_all != 'true'
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-pr
          path: results/
      
      - name: Check regression thresholds
        id: check
        run: |
          cd benchmark
          python3 scripts/check-regression.py ../results/benchmark_data.json
        
      - name: Report regressions
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🚨 Performance Regression Detected\n\n` +
              `This PR introduces performance regressions that exceed the threshold.\n\n` +
              `Please review the benchmark results and optimize before merging.`;
            
            const issueNumber = context.issue.number || context.payload.pull_request?.number;
            if (!issueNumber) {
              console.log('No PR number found');
              return;
            }
            
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: body
              });
            } catch (error) {
              console.log('Could not post regression comment:', error.message);
            }
