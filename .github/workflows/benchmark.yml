name: Performance Benchmarks

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'benchmark/**'
      - '.github/workflows/benchmark.yml'
      - 'oci/**'
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      benchmark_all:
        description: 'Run full benchmark suite (slower)'
        required: false
        default: 'false'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build FerrisRBE OCI image using Bazel (dogfooding)
  build:
    name: Build OCI Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v3
      
      - name: Configure Bazel caching
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-v7-${{ github.sha }}
          restore-keys: |
            bazel-${{ runner.os }}-v7-
      
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      
      - name: Build OCI image with Bazel
        run: |
          # Build AMD64 images (GitHub Actions runners are AMD64)
          bazel run //oci:server_load_amd64
          bazel run //oci:worker_load_amd64
          
          # Verify images were loaded
          docker images | grep ferrisrbe || true
          
          # Get image info
          echo "=== Server Image Details ==="
          docker inspect ferrisrbe/server:latest --format='{{.Size}}' | awk '{print "Size: " $1/1024/1024 " MB"}'
          docker inspect ferrisrbe/server:latest --format='{{.Id}}' | cut -d: -f2 | head -c 12 | xargs -I {} echo "Image ID: {}"
          
          echo "=== Worker Image Details ==="
          docker inspect ferrisrbe/worker:latest --format='{{.Size}}' | awk '{print "Size: " $1/1024/1024 " MB"}'
          docker inspect ferrisrbe/worker:latest --format='{{.Id}}' | cut -d: -f2 | head -c 12 | xargs -I {} echo "Image ID: {}"
      
      - name: Save images as artifacts
        run: |
          mkdir -p /tmp/docker-images
          docker save ferrisrbe/server:latest | gzip > /tmp/docker-images/ferrisrbe-server.tar.gz
          docker save ferrisrbe/worker:latest | gzip > /tmp/docker-images/ferrisrbe-worker.tar.gz
      
      - name: Upload server image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferrisrbe-image
          path: /tmp/docker-images/ferrisrbe-server.tar.gz
          retention-days: 1

      - name: Upload worker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferrisrbe-worker-image
          path: /tmp/docker-images/ferrisrbe-worker.tar.gz
          retention-days: 1

  # Run full benchmarks on PR: benchmark suite + comparison vs official release + regression check
  # Posts a single unified comment (upserted on every push).
  benchmark-pr:
    name: Benchmark PR
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: write

    services:
      bazel-remote:
        image: buchgr/bazel-remote-cache:latest
        ports:
          - 9094:9094
          - 8080:8080
        env:
          BAZEL_REMOTE_GRPC_PORT: 9094
          BAZEL_REMOTE_HTTP_PORT: 8080
          BAZEL_REMOTE_DIR: /data
          BAZEL_REMOTE_MAX_SIZE: 1

    env:
      CAS_ENDPOINT: localhost:9094
      BENCHMARK_SERVICES: 1

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Download server image artifact
        uses: actions/download-artifact@v4
        with:
          name: ferrisrbe-image
          path: /tmp/docker-images/

      - name: Download worker image artifact
        uses: actions/download-artifact@v4
        with:
          name: ferrisrbe-worker-image
          path: /tmp/docker-images/

      - name: Load Docker images
        run: |
          gunzip -c /tmp/docker-images/ferrisrbe-server.tar.gz | docker load
          gunzip -c /tmp/docker-images/ferrisrbe-worker.tar.gz | docker load
          docker images | grep ferrisrbe || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip bc netcat-openbsd
          pip3 install grpcio grpcio-tools

      - name: Run full benchmark suite
        id: benchmark
        run: |
          cd benchmark
          ./scripts/benchmark-ci.sh full
        continue-on-error: true

      - name: Compare PR vs official release
        id: compare
        run: |
          cd benchmark
          ./scripts/compare-branches.sh ferrisrbe/server:latest
        continue-on-error: true

      - name: Check regression thresholds
        id: regression
        run: |
          python3 benchmark/scripts/check-regression.py benchmark/results/benchmark_data.json
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-pr
          path: benchmark/results/
          retention-days: 30

      - name: Write step summary
        if: always()
        run: |
          if [ -f benchmark/results/benchmark_summary.md ]; then
            cat benchmark/results/benchmark_summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Benchmark failed to complete." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post unified PR comment
        uses: actions/github-script@v7
        if: always()
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const MARKER = '<!-- ferrisrbe-benchmark-report -->';

            // --- Benchmark results section ---
            let benchSection = '';
            const summaryPath = 'benchmark/results/benchmark_summary.md';
            if (fs.existsSync(summaryPath)) {
              benchSection = fs.readFileSync(summaryPath, 'utf8').trim();
            } else {
              benchSection = '❌ Benchmark suite did not produce a summary. Check the workflow logs.';
            }

            // --- Comparison section ---
            let compareSection = '';
            const comparisonPath = 'benchmark/results/comparison.md';
            if (fs.existsSync(comparisonPath)) {
              // Strip a leading H2 if comparison.md already starts with one to avoid duplication
              compareSection = fs.readFileSync(comparisonPath, 'utf8')
                .trim()
                .replace(/^##\s+.*\n/, '');
            } else {
              compareSection = '_Comparison against official release not available._';
            }

            // --- Regression section ---
            const regressionFailed = '${{ steps.regression.outcome }}' === 'failure';
            let regressionSection = '';
            const failedPath = 'benchmark/results/failed_metrics.json';
            if (regressionFailed && fs.existsSync(failedPath)) {
              const failed = JSON.parse(fs.readFileSync(failedPath, 'utf8'));
              regressionSection += '> ⚠️ **Regression detected** — the following metrics exceeded their thresholds:\n\n';
              regressionSection += '| Metric | Actual | Threshold | Unit |\n';
              regressionSection += '|--------|--------|-----------|------|\n';
              for (const [metric, info] of Object.entries(failed)) {
                regressionSection += `| **${metric}** | ${info.value} | ${info.threshold} | ${info.unit} |\n`;
              }
            } else if (regressionFailed) {
              regressionSection = '> ⚠️ **Regression check failed** — see workflow logs for details.';
            } else {
              regressionSection = '> ✅ All metrics within acceptable thresholds.';
            }

            // --- Assemble single comment ---
            const runUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            const body = [
              MARKER,
              '## 📊 FerrisRBE Benchmark Report',
              '',
              benchSection,
              '',
              '---',
              '### Comparison vs Official Release (`xangcastle/ferris-server:latest`)',
              '',
              compareSection,
              '',
              '---',
              '### Regression Check',
              '',
              regressionSection,
              '',
              '---',
              `_Commit: \`${{ github.sha }}\` · [Full logs and artifacts](${runUrl})_`,
            ].join('\n');

            const issueNumber = context.issue.number || context.payload.pull_request?.number;
            if (!issueNumber) { console.log('No PR number, skipping'); return; }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const existing = comments.find(c => c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log('Updated existing benchmark comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
              console.log('Created benchmark comment');
            }

  # Run full benchmarks on main branch or manual trigger
  benchmark-full:
    name: Benchmark Full Suite (Container)
    runs-on: ubuntu-latest-8-core  # Larger runner for full benchmarks
    needs: build
    if: github.event_name == 'push' || github.event.inputs.benchmark_all == 'true'
    permissions:
      contents: read
    
    # Use GitHub Actions services for bazel-remote (CAS)
    services:
      bazel-remote:
        image: buchgr/bazel-remote-cache:latest
        ports:
          - 9094:9094
          - 8080:8080
        env:
          BAZEL_REMOTE_GRPC_PORT: 9094
          BAZEL_REMOTE_HTTP_PORT: 8080
          BAZEL_REMOTE_DIR: /data
          BAZEL_REMOTE_MAX_SIZE: 1
    
    env:
      CAS_ENDPOINT: localhost:9094
      BENCHMARK_SERVICES: 1
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for comparison
      
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ferrisrbe-image
          path: /tmp/docker-images/
      
      - name: Load Docker image
        run: |
          gunzip -c /tmp/docker-images/ferrisrbe-server.tar.gz | docker load
          docker images | grep ferrisrbe || true
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip bc netcat-openbsd
          pip3 install grpcio grpcio-tools
      
      - name: Run full benchmark suite (container)
        run: |
          cd benchmark
          ./scripts/benchmark-ci.sh full
      
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark/results/benchmark_data.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'  # Fail if 50% slower
          comment-on-alert: true
          fail-on-alert: true
      
      - name: Upload detailed results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-full
          path: benchmark/results/
          retention-days: 90

