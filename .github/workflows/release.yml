name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: xangcastle/ferris

jobs:
  build-and-push:
    name: Build and Push Multi-Platform Images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/Cargo.lock', '**/MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # Build and push multi-platform images using oci_push
      # oci_push reads credentials from ~/.docker/config.json (created by docker/login-action)
      - name: Build and push multi-platform images
        run: |
          # Build all images (AMD64 + ARM64) and the multi-platform index
          bazel build //oci:server_multiplatform //oci:worker_multiplatform
          
          # Push server multi-platform image (includes both AMD64 and ARM64)
          bazel run //oci:server_push -- \
            --tag ${{ steps.version.outputs.version }} \
            --tag latest
          
          # Push worker multi-platform image (includes both AMD64 and ARM64)
          bazel run //oci:worker_push -- \
            --tag ${{ steps.version.outputs.version }} \
            --tag latest

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          body: |
            ## Docker Images
            
            Multi-platform images (AMD64, ARM64) are available on Docker Hub:
            
            ```bash
            # Server
            docker pull xangcastle/ferris-server:${{ github.ref_name }}
            docker pull xangcastle/ferris-server:latest
            
            # Worker
            docker pull xangcastle/ferris-worker:${{ github.ref_name }}
            docker pull xangcastle/ferris-worker:latest
            ```
            
            ## Platforms
            - `linux/amd64`
            - `linux/arm64`
