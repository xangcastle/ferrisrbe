name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: xangcastle/ferris

jobs:
  build-and-push:
    name: Build and Push Multi-Platform Images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/Cargo.lock', '**/MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build and push multi-platform images
        run: |
          bazel build \
            //oci:server.image.multiplatform \
            //oci:worker.image.multiplatform \
            //oci:cache.image.multiplatform \
            //oci:bes.image.multiplatform

          for target in server worker cache bes; do
            bazel run "//oci:${target}.image.push" -- \
              --tag "${{ steps.version.outputs.version }}" \
              --tag latest
          done

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          body: |
            ```bash
            docker pull xangcastle/ferris-server:${{ github.ref_name }}
            docker pull xangcastle/ferris-server:latest

            docker pull xangcastle/ferris-worker:${{ github.ref_name }}
            docker pull xangcastle/ferris-worker:latest

            docker pull xangcastle/ferris-cache:${{ github.ref_name }}
            docker pull xangcastle/ferris-cache:latest

            docker pull xangcastle/ferris-bes:${{ github.ref_name }}
            docker pull xangcastle/ferris-bes:latest
            ```
            - `linux/amd64`
            - `linux/arm64`
