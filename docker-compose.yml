version: '3.8'

services:
  # CAS (Content Addressable Storage)
  bazel-remote:
    image: buchgr/bazel-remote-cache:latest
    ports:
      - "9094:9094"
      - "8080:8080"
    volumes:
      - bazel-remote-data:/data
    command:
      - --dir=/data
      - --max_size=10
      - --grpc_port=9094
      - --port=8080
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/status"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis (metadata store)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # RBE Server
  server:
    image: xangcastle/ferris-server:0.1.0-test-amd64
    ports:
      - "9092:9092"
    environment:
      - RBE_PORT=9092
      - RBE_BIND_ADDRESS=0.0.0.0
      - RUST_LOG=info
      - CAS_ENDPOINT=bazel-remote:9094
      - REDIS_ENDPOINT=redis:6379
      - RBE_L1_CACHE_CAPACITY=100000
    depends_on:
      bazel-remote:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # RBE Worker
  worker:
    image: xangcastle/ferris-worker:0.1.0-test-amd64
    environment:
      - WORKER_ID=worker-local
      - SERVER_ENDPOINT=http://server:9092
      - CAS_ENDPOINT=http://bazel-remote:9094
      - RUST_LOG=info
      - MAX_CONCURRENT=4
      - WORKER_TYPE=default
      - WORKER_LABELS=os=linux,arch=amd64
    depends_on:
      server:
        condition: service_healthy
    deploy:
      replicas: 2
    volumes:
      - worker-workdir:/workspace

volumes:
  bazel-remote-data:
  redis-data:
  worker-workdir:
